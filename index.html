*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;height:auto}
body{background:#142840;font-family:'Season Sans',sans-serif;color:#F4F4E6;margin:0;min-height:100%}
h1,h2,h3,h4{font-family:'Season Mix',sans-serif;font-weight:700}
:root{--bg:#142840;--surface:rgba(10,18,40,0.55);--surface-2:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);
  --purple:#6F70F6;--purple-dark:#5a5be0;--sky:#5CCEFF;--amber:#FFC60A;--mint:#57FFA7;--crimson:#F06050;
  --text-dark:#F4F4E6;--text-mid:#c8cad8;--text-muted:#7a8a9a}
/* Layout */
.app-layout{display:flex;min-height:100vh;align-items:flex-start;}
.sidebar-header{padding:20px 20px 12px;}
.sidebar-logo{height:24px;margin-bottom:12px;display:block;opacity:.9;}
.sidebar-tag{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#6F70F6;margin-bottom:6px;}
.sidebar-title{font-size:14px;color:#F4F4E6;font-weight:500;line-height:1.4;}
.sidebar{width:272px;min-width:272px;background:rgba(8,14,28,0.60);color:#F4F4E6;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidebar-course-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:rgba(244,244,230,.65);margin-bottom:16px;line-height:1.4}
.progress-wrap{padding:0 20px 16px;}
.progress-bar-wrap{background:#1e2130;border-radius:99px;height:4px;margin-bottom:6px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6F70F6,#5CCEFF);border-radius:99px;width:0%;transition:width .4s ease}
.progress-label{font-size:11px;color:rgba(244,244,230,.5);letter-spacing:.02em;margin-top:2px}
.module-nav{display:flex;flex-direction:column;gap:3px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:8px 12px;margin:1px 0;border-radius:12px;border:none;
  background:transparent;color:rgba(244,244,230,.82);text-align:left;width:100%;cursor:pointer;
  font-family:'Season Sans',sans-serif;font-size:13px;transition:background .15s}
.nav-item.active{background:rgba(99,120,253,.3);color:#F4F4E6;font-weight:700}
.nav-item.done{color:rgba(92,206,255,.8)}
.nav-item.done:hover,.nav-item.active:hover{background:rgba(255,255,255,.07)}
.nav-icon{width:36px;height:36px;border-radius:50%;
  background:#1a1d2e;border:1.5px solid #252840;
  display:grid;place-items:center;font-size:12px;flex-shrink:0;font-family:'Season Mix',serif;
  font-weight:700;line-height:1;color:#4a4d62;transition:background .2s,border-color .2s}
.nav-item.active .nav-icon{background:#6F70F6;border-color:#6F70F6;color:#fff}
.nav-item.done .nav-icon{background:rgba(87,255,167,.12);border-color:rgba(87,255,167,.3);color:#57FFA7}
.nav-item.active .nav-icon{background:#6F70F6}
.nav-item.done .nav-icon{background:rgba(92,206,255,.2);font-size:0}
.nav-text{display:flex;flex-direction:column;gap:2px}
.nav-title{font-size:13px;line-height:1.3}
.nav-sub{font-size:11px;color:rgba(244,244,230,.58)}
.nav-time{font-size:11px;color:rgba(244,244,230,.58)}
.content-area{flex:1;min-height:100vh;position:relative;padding:40px 40px 80px;min-width:0;display:grid;
  grid-template-columns:minmax(0,760px);justify-content:center;align-content:start}
/* Nav bar */




/* Welcome */
.welcome-tag{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#6F70F6;margin-bottom:14px}
.welcome-headline{font-size:42px;font-weight:400;line-height:1.15;margin-bottom:8px;color:#F4F4E6}
.welcome-headline span{color:#6F70F6}
.welcome-quote{padding:20px 24px;margin:24px 0;background:var(--surface);border:1px solid var(--border);
  border-top:2px solid rgba(111,112,246,.4);border-radius:12px;font-size:14px;line-height:1.7;color:#c8cad8}
.outcomes-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#5CCEFF;margin-bottom:14px}
.outcome-card{display:flex;align-items:flex-start;gap:16px;background:rgba(10,18,32,0.55);border-radius:12px;
  padding:16px 20px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.07);transition:border-color .2s}
.outcome-card:hover{border-color:rgba(111,112,246,.25)}
.outcome-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.outcome-card-text h4{font-size:14px;color:#F4F4E6;font-weight:400;margin-bottom:4px;font-family:'Season Sans',sans-serif}
.outcome-card-text p{font-size:13px;color:rgba(244,244,230,0.55);line-height:1.5}
.course-map{display:flex;gap:8px;flex-wrap:nowrap;margin:20px 0;overflow-x:auto;padding-bottom:4px}
.map-pill{background:rgba(10,18,32,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 14px;
  font-size:12px;color:rgba(244,244,230,0.55);display:flex;align-items:center;gap:7px;white-space:nowrap}
.map-pill strong{color:#F4F4E6}
/* Module */
.module-headline{font-size:40px;font-weight:400;line-height:1.15;color:#e8e9f8;margin-bottom:0}
.module-body{background:rgba(14,26,48,0.75);border-top:2px solid #6F70F6;
  border-right:1px solid rgba(111,112,246,0.55);border-bottom:1px solid rgba(111,112,246,0.55);
  border-left:1px solid rgba(111,112,246,0.55);border-radius:14px;padding:20px 24px;margin-top:24px;margin-bottom:24px}
.module-overview-label{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:#6F70F6;display:block;margin-bottom:14px}
.module-overview-hook{color:#dde2f0;font-size:15px;line-height:1.7;margin:0 0 16px;font-weight:400}
.module-results{display:flex;flex-direction:column;gap:8px;margin:0}
.module-result{display:flex;align-items:flex-start;gap:10px}
.module-result-arrow{color:#6F70F6;flex-shrink:0;margin-top:2px;font-size:14px}
.module-result-text{color:#9aa4bc;font-size:13px;line-height:1.5}
/* Section head */
.sec-head{display:flex;flex-direction:column;align-items:flex-start;gap:10px;margin:36px 0 18px}
.sec-head-row{display:flex;align-items:center;gap:12px;width:100%}
.sec-dot{width:5px;height:28px;background:#6F70F6;border-radius:3px;flex-shrink:0;align-self:center}
.sec-head h2{font-size:28px;color:#e8e9f8;font-weight:400;margin:0;font-family:'Season Mix',sans-serif}
.sec-hint{display:block;font-size:12px;color:#4e5666;font-style:italic;font-family:'Season Sans',sans-serif;line-height:1.6;margin-bottom:14px}
.sec-hint-sky{background:rgba(92,206,255,0.07);color:#7a9aae}
.storytell{font-size:14px;color:#c8cad8;line-height:1.7;margin-bottom:12px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:18px}
/* Mod conclusion */
.mod-conclusion{background:rgba(14,26,48,0.75);border-top:2px solid #FFC60A;
  border-right:1px solid rgba(255,198,10,0.55);border-bottom:1px solid rgba(255,198,10,0.55);
  border-left:1px solid rgba(255,198,10,0.55);border-radius:14px;padding:20px 24px;margin-top:40px;margin-bottom:10px}
.mod-conclusion-label{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:#FFC60A;display:block;margin-bottom:14px}
.mod-conclusion p{font-size:14px;color:#dde2f0;line-height:1.7;margin:0;font-weight:400}
.mod-conclusion p+p{margin-top:10px}
/* Complete btn */
.complete-wrap{margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:14px}
.complete-btn{display:inline-flex;align-items:center;gap:8px;background:#6F70F6;color:#F4F4E6;
  border:none;border-radius:10px;padding:12px 28px;font-family:'Season Sans',sans-serif;
  font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.complete-btn:hover{background:#5a5be0}
/* Flip cards */
.flip-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.flip-card{height:170px;perspective:800px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s ease}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:14px;padding:18px 16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.flip-front{background:var(--surface);border:1px solid var(--border)}
.flip-front:hover{border-color:rgba(99,120,253,.35);background:rgba(99,120,253,.03)}
.flip-back{background:linear-gradient(135deg,#6F70F6,#6F70F6);transform:rotateY(180deg)}
.flip-icon{display:flex;align-items:center;justify-content:center;margin-bottom:10px;min-height:36px}
.flip-front h4{font-size:14px;color:var(--text-dark);margin-bottom:6px;line-height:1.3}
.flip-front p.fhint{font-size:11px;color:var(--text-muted);margin-top:4px}
.flip-back h4{font-size:12px;color:#F4F4E6;margin-bottom:8px;font-family:'Season Mix',sans-serif}
.flip-back p{font-size:12px;color:rgba(244,244,230,.9);line-height:1.5}
.nb-icon{display:inline-block;vertical-align:middle;flex-shrink:0;object-fit:contain}
.nb-icon-20{width:20px;height:20px}.nb-icon-28{width:28px;height:28px}
/* Myth vs Reality */
.myth-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.myth-card{background:var(--surface);border:2px solid #f06050;border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .3s}
.myth-card.revealed{border-color:#34c17a}
.myth-front{padding:16px 20px}
.myth-back{display:none;padding:16px 20px;background:rgba(52,193,122,.06);border-top:2px solid rgba(52,193,122,.3)}
.myth-card.revealed .myth-back{display:block}
.myth-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--crimson);display:block;margin-bottom:4px}
.myth-label.reality{color:#34c17a}
.myth-front p{font-size:14px;color:var(--text-dark);margin:0 0 6px;line-height:1.5}
.myth-back p{font-size:13px;color:var(--text-mid);margin:0;line-height:1.5}
.myth-tap{font-size:11px;color:var(--text-muted)}
/* Accordion */
.accordion{margin-bottom:18px}
.accordion-item{border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden}
.accordion-header{width:100%;background:var(--surface);border:none;cursor:pointer;padding:14px 18px;
  text-align:left;font-size:14px;font-weight:600;font-family:'Season Sans',sans-serif;
  display:flex;justify-content:space-between;align-items:center;color:var(--text-dark);transition:background .15s}
.accordion-header:hover{background:rgba(99,120,253,.04)}
.accordion-header.open{background:rgba(99,120,253,.06);color:#6F70F6}
.acc-icon{transition:transform .25s;font-style:normal;color:var(--text-muted)}
.accordion-header.open .acc-icon{transform:rotate(180deg);color:#6F70F6}
.accordion-body{display:none;padding:12px 18px 16px;background:rgba(20,40,64,0.5);font-size:13px;color:var(--text-mid);line-height:1.6}
.accordion-body.open{display:block}
/* Tabs */
.tabs{margin-bottom:18px}
.tab-list{display:flex;gap:4px;border-bottom:2px solid var(--border);flex-wrap:wrap;margin-bottom:0}
.tab-btn{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;
  font-family:'Season Sans',sans-serif;font-weight:600;color:var(--text-muted);
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:#6F70F6;border-bottom-color:#6F70F6}
.tab-btn:hover:not(.active){color:var(--text-dark)}
.tab-panels{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;padding:18px 20px}
.tab-content{display:none}
.tab-content.active{display:block}
.tab-content h4{font-size:15px;color:#F4F4E6;margin-bottom:8px}
.tab-content p{font-size:13px;color:#c8cad8;line-height:1.7;margin-bottom:8px}
.tab-content p:last-child{margin-bottom:0}
.metric-highlight{display:inline-block;background:rgba(111,112,246,.15);color:#9b9df8;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600;margin-bottom:10px}
/* Numbers callout */
.numbers-callout{background:rgba(14,26,48,0.75);border:1px solid rgba(255,198,10,.3);border-left:4px solid #FFC60A;
  border-radius:14px;padding:20px 24px;margin-bottom:18px}
.numbers-callout h4{font-size:14px;color:#FFC60A;margin-bottom:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.numbers-row{display:flex;gap:24px;flex-wrap:wrap}
.numbers-stat{text-align:center;min-width:80px}
.numbers-stat .big{font-size:36px;font-weight:400;font-family:'Season Mix',sans-serif;color:#FFC60A;line-height:1}
.numbers-stat .label{font-size:11px;color:rgba(244,244,230,.6);margin-top:4px}
.numbers-formula{font-size:13px;color:#c8cad8;margin-top:12px;line-height:1.7}
/* Timeline */
.timeline-flow{display:flex;flex-direction:column;margin-bottom:18px}
.tl-item{display:flex;align-items:flex-start;gap:0;margin-bottom:4px}
.tl-dot{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:48px;padding-top:2px}
.tl-dot span{width:36px;height:36px;border-radius:50%;background:#6F70F6;color:#F4F4E6;
  display:flex;align-items:center;justify-content:center;font-family:'Season Mix',sans-serif;
  font-weight:700;font-size:14px;flex-shrink:0;z-index:1}
.tl-line{width:2px;background:linear-gradient(to bottom,#6F70F6,rgba(99,120,253,.2));margin:0 auto;flex:1;min-height:20px}
.tl-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;margin-left:14px;flex:1;min-width:0}
.tl-content h4{font-size:14px;color:var(--text-dark);margin-bottom:5px}
.tl-content p{font-size:13px;color:var(--text-mid);line-height:1.5;margin:0}
.tl-last .tl-content{margin-bottom:0}.tl-last .tl-line{display:none}
/* Dialogue */
.dialogue-sim{margin:14px 0 18px}
.dialogue-toggle{display:flex;gap:8px;margin-bottom:14px}
.dtoggle-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);
  font-size:13px;font-family:'Season Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-mid)}
.dtoggle-btn.active{background:#6F70F6;color:#F4F4E6;border-color:#6F70F6}
.dialogue-scene{display:flex;flex-direction:column;gap:8px}
.dialogue-scene.hidden{display:none}
.bubble{max-width:75%;padding:10px 14px;border-radius:12px}
.bubble.advisor{background:rgba(99,120,253,.1);align-self:flex-start;border-bottom-left-radius:2px}
.bubble.client{background:rgba(255,172,51,.12);align-self:flex-end;border-bottom-right-radius:2px}
.speaker{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:3px}
.bubble p{font-size:13px;color:var(--text-dark);margin:0;line-height:1.5}
.dialogue-note{margin-top:8px;padding:10px 14px;border-radius:10px;font-size:13px}
.dialogue-note.bad{background:rgba(130,6,63,.07);border:1px solid rgba(130,6,63,.3);color:var(--crimson)}
.dialogue-note.good{background:rgba(52,193,122,.08);border:1px solid rgba(52,193,122,.3);color:#1a6e47}
/* Scenario */
.scenario-block{background:rgba(255,172,51,.06);border:1px solid rgba(255,172,51,.3);border-radius:14px;padding:20px 24px;margin-bottom:18px}
.scenario-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--amber);display:block;margin-bottom:8px}
.scenario-block > p{font-size:14px;color:var(--text-dark);margin-bottom:8px;line-height:1.5}
.scenario-choices{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.scenario-choice{padding:10px 14px;border:1.5px solid rgba(255,172,51,.4);border-radius:10px;
  background:var(--surface);text-align:left;cursor:pointer;font-size:13px;
  font-family:'Season Sans',sans-serif;color:var(--text-dark);transition:background .15s,border-color .15s}
.scenario-choice:hover:not(:disabled){background:rgba(92,206,255,.08);border-color:rgba(92,206,255,.6)}
.scenario-choice.wrong{background:rgba(130,6,63,.07)!important;border-color:rgba(130,6,63,.5)!important;color:var(--crimson)}
.scenario-choice.correct{background:rgba(52,193,122,.1)!important;border-color:rgba(52,193,122,.5)!important;color:#1a6e47}
.scenario-choice:disabled{cursor:default;opacity:.75}
.scenario-result{margin-top:12px;padding:12px 16px;border-radius:10px;display:none;font-size:13px}
.scenario-result.good{background:rgba(52,193,122,.08);border:1px solid rgba(52,193,122,.3);color:#1a6e47}
.scenario-result.bad{background:rgba(130,6,63,.07);border:1px solid rgba(130,6,63,.3);color:var(--crimson)}
/* Video */
.video-outer{margin-bottom:8px;width:100%;display:block}
.video-cover-wrap{position:relative;margin-bottom:0;width:100%;display:block}
.video-cover{position:absolute;inset:0;z-index:10;cursor:pointer;border-radius:12px;overflow:hidden;
  background:#142840;display:flex;align-items:flex-end}
.video-cover.hidden{display:none}
.vc-star{position:absolute;right:-22%;top:50%;transform:translateY(-50%);width:65%;aspect-ratio:1;object-fit:contain}
.vc-logo{position:absolute;top:18px;left:20px;height:18px;filter:brightness(0) invert(1);opacity:.7}
.vc-title-area{position:relative;z-index:2;padding:0 0 28px 20px;border-left:4px solid #6F70F6;margin:0 0 0 20px}
.vc-title{font-size:clamp(18px,2.5vw,26px);color:#e8e9f8;font-weight:400;line-height:1.25;font-family:'Season Mix',sans-serif;margin-bottom:6px}
.vc-sub{font-size:12px;color:rgba(244,244,230,.45);line-height:1.5;font-family:'Season Sans',sans-serif}
.video-wrapper{position:relative;border-radius:12px;overflow:hidden;background:#000}
.video-wrapper::before{content:'';display:block;padding-top:56.25%}
.video-wrapper iframe{position:absolute;top:-52px;left:0;width:100%;height:calc(100% + 52px);border:none}
/* KC */
.kc-start-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 32px;
  background:var(--surface);border-top:2px solid #6F70F6;border-right:1px solid rgba(111,112,246,0.55);
  border-bottom:1px solid rgba(111,112,246,0.55);border-left:1px solid rgba(111,112,246,0.55);
  border-radius:14px;margin:auto;align-self:center;margin-bottom:0;}
.kc-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(111,112,246,.15);color:#9b9df8;
  font-size:12px;font-weight:600;padding:5px 14px;border-radius:99px;margin-bottom:16px}
.kc-start-title{font-size:24px;color:#F4F4E6;font-weight:400;font-family:'Season Mix',sans-serif;margin-bottom:24px}
.kc-stats{display:flex;align-items:center;gap:0;margin-bottom:24px}
.kc-stat{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 32px}
.kc-stat-icon{color:#6a7a8a}
.kc-stat-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#4a5a6a}
.kc-stat-val{font-size:28px;font-weight:500;color:#F4F4E6;font-family:'Season Mix',sans-serif}
.kc-stat-divider{width:1px;height:60px;background:rgba(255,255,255,0.08)}
.kc-start-btn{background:#6F70F6;color:#F4F4E6;border:none;border-radius:10px;padding:14px 48px;
  font-family:'Season Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.kc-start-btn:hover{background:#5a5be0}
.kc-progress-bar-wrap{margin-bottom:20px}
.kc-qnum{font-size:12px;color:#6a7a8a;margin-bottom:8px}
.kc-track{background:rgba(255,255,255,.08);border-radius:99px;height:4px;overflow:hidden}
.kc-fill{height:100%;background:linear-gradient(90deg,#5CCEFF,#6F70F6);border-radius:99px;transition:width .3s ease}
.quiz-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:14px}
.quiz-q{font-size:15px;color:#F4F4E6;margin-bottom:14px;line-height:1.5;font-family:'Season Mix',sans-serif;font-weight:400}
.quiz-opts{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.quiz-opts label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 14px;
  border:1px solid rgba(255,255,255,0.07);border-radius:10px;font-size:13px;color:#999;transition:all .15s}
.quiz-opts label:hover{border-color:#6F70F6;color:#F4F4E6}
.quiz-opts input[type="radio"]{margin-top:2px;flex-shrink:0;accent-color:#6F70F6}
.quiz-opts label.opt-correct{background:rgba(87,255,167,.1)!important;border-color:#57FFA7!important;color:#57FFA7!important}
.quiz-opts label.opt-user-wrong{background:rgba(240,96,80,.07)!important;border-color:rgba(240,96,80,.3)!important;color:#f06050!important}
.quiz-opts label.opt-selected{border-color:#6F70F6!important;background:rgba(111,112,246,.08)!important;color:#c8cad8!important}
.quiz-explain{margin-top:8px;font-size:12px;padding:8px 12px;border-radius:8px;display:none}
.quiz-explain.show-correct{display:block;background:rgba(87,255,167,.06);border:1px solid rgba(87,255,167,.2);color:#57FFA7}
.quiz-explain.show-wrong{display:block;background:rgba(240,96,80,.06);border:1px solid rgba(240,96,80,.2);color:#f06050}
.quiz-score{display:none;background:var(--surface);border:1px solid #6F70F6;border-radius:14px;padding:24px;text-align:center;margin-top:16px}
.quiz-score.visible{display:block}
.quiz-score-num{font-size:52px;font-family:'Season Mix',sans-serif;font-weight:400;color:#FFC60A}
/* Summary */
.summary-section{margin-bottom:28px}
.summary-section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.summary-section-head h2{font-size:18px;font-weight:500;margin:0}
.summary-accent{width:4px;height:22px;border-radius:2px;flex-shrink:0}
.takeaway-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.takeaway-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:12px;
  padding:18px 20px 18px 16px;display:flex;align-items:flex-start;gap:16px;border-left:3px solid var(--tc,#6F70F6)}
.takeaway-body h4{font-size:14px;font-weight:600;color:#F4F4E6;margin-bottom:5px}
.takeaway-body p{font-size:13px;color:#7a8a9a;line-height:1.6;margin:0}
.r-prompt{background:var(--surface);border:1px solid rgba(255,255,255,0.07);
  border-left:2px solid rgba(255,198,10,.5);border-radius:12px;padding:14px 18px;
  font-size:14px;color:#c8cad8;font-style:italic;line-height:1.7;margin-bottom:10px}
.action-checks{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.action-checks li{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;
  background:var(--surface);border:1px solid rgba(255,255,255,0.07);
  border-left:2px solid rgba(92,206,255,0.55);border-radius:12px;cursor:pointer;transition:all .15s}
.action-checks li:hover{border-color:rgba(255,255,255,0.12)}
.action-checks li.done{border-left-color:rgba(92,206,255,.5)}
.ach-box{width:20px;height:20px;border:1.5px solid #444;border-radius:5px;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.action-checks li.done .ach-box{background:#5CCEFF;border-color:#5CCEFF}
.action-checks li.done .ach-box::after{content:"\2713";color:#142840;font-size:11px}
.action-checks li div strong{font-size:14px;color:#F4F4E6;display:block;margin-bottom:3px;font-weight:400}
.action-checks li.done div strong{color:#5CCEFF}
.action-checks li div p{font-size:12px;color:#666;line-height:1.5;margin:0}

.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb-purple{width:420px;height:420px;background:rgba(111,112,246,.07);top:-80px;left:180px}
.orb-cyan{width:320px;height:320px;background:rgba(87,255,167,.05);bottom:80px;right:60px}
.orb-coral{width:280px;height:280px;background:rgba(255,120,80,.04);top:60%;left:40%}

.back-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;
  color:rgba(244,244,230,.5);border:1px solid rgba(244,244,230,.15);border-radius:10px;
  padding:12px 20px;font-family:'Season Sans',sans-serif;font-size:13px;cursor:pointer;
  transition:all .2s}
.back-btn:hover{color:rgba(244,244,230,.8);border-color:rgba(244,244,230,.3)}

.habit-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.habit-card{display:flex;align-items:flex-start;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;transition:border-color .2s}
.habit-card:hover{border-color:rgba(111,112,246,.4)}
.habit-num{width:36px;height:36px;min-width:36px;border-radius:50%;background:#6F70F6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Season Mix',serif;flex-shrink:0;margin-top:1px}
.habit-body h4{font-size:14px;color:#F4F4E6;font-weight:600;margin-bottom:6px;font-family:'Season Sans',sans-serif}
.habit-body p{font-size:13px;color:#8a92aa;line-height:1.6;margin:0}
.habit-body .habit-note{font-style:italic;color:#6F70F6;font-size:12px;margin-top:8px;padding:8px 12px;background:rgba(111,112,246,.08);border-radius:8px;border-left:2px solid #6F70F6}

.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.reason-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s;cursor:pointer;}
.reason-card:hover{border-color:rgba(111,112,246,.4);box-shadow:0 4px 20px rgba(111,112,246,.1)}
.reason-card.open{border-color:rgba(111,112,246,.35)}
.reason-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--rc,#6F70F6)}
.reason-icon{font-size:24px;margin-bottom:10px;display:block}
.reason-title{font-size:14px;font-weight:600;color:#F4F4E6;margin-bottom:0;font-family:'Season Sans',sans-serif;line-height:1.3;display:flex;justify-content:space-between;align-items:center;gap:8px}
.reason-toggle{font-size:18px;color:rgba(244,244,230,.3);transition:transform .2s,color .2s;flex-shrink:0;}
.reason-card.open .reason-toggle{transform:rotate(45deg);color:var(--rc,#6F70F6);}.reason-card.open .reason-body{display:block}.reason-card.open .reason-body{display:block}.reason-card.open .reason-body{display:block}
.reason-body{font-size:13px;color:#7a8a9a;line-height:1.6;margin:0;display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.reason-card.open .reason-body{display:block}


#kcStart.kc-start-screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:680px;max-width:90%;}

n is this?", "opts": [["a", "Replying when you remember"], ["b", "The message came in while you were busy"], ["c", "Notifications weren't set up"], ["d", "The reply felt too long to write"]], "correct": "b", "expC": "Correct. Messenger doesn't pause during live sessions. Messages arrive at any time and can sit unnoticed if you're not checking on a schedule.", "expW": "While notifications could help catch it, the core reason here is that Messenger activity happens outside of live chat. Two scheduled check windows prevent this entirely."}, {"q": "What is the main goal of a Messenger reply?", "opts": [["a", "To fully resolve the client's question in writing"], ["b", "To demonstrate your knowledge of their situation"], ["c", "To bring the client back into a live chat"], ["d", "To collect feedback on their last session"]], "correct": "c", "expC": "Correct. The goal isn't to close the question — it's to create a pull back to a live chat. Short + hook + CTA achieves this every time.", "expW": "Messenger replies aren't meant to replace live chats. The formula is short acknowledgement → value teaser → invitation to chat. Resolution happens in the session."}, {"q": "How many Messenger check windows per shift does the course recommend?", "opts": [["a", "One — at the start of your shift"], ["b", "Two — start and end of shift"], ["c", "Three — morning, midday, and evening"], ["d", "Check continuously throughout the shift"]], "correct": "b", "expC": "Correct. Start and end of shift — 10–15 minutes each. That's enough to ensure nothing sits longer than 24 hours.", "expW": "Two fixed windows cover the gap efficiently. Continuous checking isn't sustainable; one window isn't enough. Start + end of shift is the recommended cadence."}, {"q": "Which of the following best describes a strong Messenger reply?", "opts": [["a", "A full answer that resolves the client's question completely"], ["b", "An apology for the wait, followed by a detailed response"], ["c", "A short acknowledgement with a teaser and an invitation to chat"], ["d", "A greeting and an open question about how the client is doing"]], "correct": "c", "expC": "Correct. Short acknowledgement → value teaser → invitation to live chat. The example from the course: \"I see your question and I'm already thinking about your situation. Want to meet in a live chat?\"", "expW": "Strong Messenger replies are short and pull-focused. The goal is to bring the client back — not to resolve everything in writing. Short + hook + CTA is the formula."}, {"q": "Which metrics can improve when you consistently answer Messenger messages within 48h?", "opts": [["a", "Only the Messenger Answer Rate metric"], ["b", "Retained Chat Duration, CR to Retained Chat, CR Free to Paid, and Pings Coverage"], ["c", "Only live-chat-related metrics"], ["d", "Shift completion rate and total messages received"]], "correct": "b", "expC": "Correct. Timely replies create a ripple effect. Clients who feel heard offline return for longer sessions, convert more often, and build stronger retention habits.", "expW": "The impact extends to four other metrics. Staying present in Messenger affects Retained Chat Duration, CR to Retained Chat, CR Free to Paid, and Nebula X Pings Coverage."}, {"q": "You have 30 seconds between live chats. A Messenger message sent 4 hours ago needs a full reply. What should you do?", "opts": [["a", "Wait until your next break to write a proper answer"], ["b", "Skip it — a rushed reply is worse than no reply"], ["c", "Send a brief acknowledgement now; follow up in your next check window"], ["d", "Ask a colleague to reply so the client doesn't wait"]], "correct": "c", "expC": "Correct. A brief acknowledgement stops the clock on the client's wait, shows presence, and buys you time for a proper follow-up.", "expW": "Something always beats silence. A quick acknowledgement — \"I see your message, I'll get back to you shortly\" — keeps trust intact until you can write a full reply."}, {"q": "An advisor replies to every Messenger message within 12 hours — but never includes a CTA. What outcome should they expect?", "opts": [["a", "Strong performance — 100% reply rate and clients feel supported"], ["b", "The metric looks good, but the opportunity to re-engage clients in live chat is consistently missed"], ["c", "No impact — Messenger is secondary and doesn't affect other metrics"], ["d", "The metric drops because replies without CTA are flagged by the system"]], "correct": "b", "expC": "Correct. Replying protects the metric. But without a CTA the relationship stays flat — the client was answered, not re-engaged.", "expW": "Replying without a CTA saves the stat but wastes the opportunity. Every Messenger reply is a pull moment. Short + hook + invitation — that's what moves the relationship forward."}];var MODULES=[function(){return `<div class="welcome-tag">Welcome to the Course</div><h1 class="welcome-headline">Metric Mastery:<br><span>Messenger Answer Rate</span></h1><div class="welcome-quote"><p style="margin:0 0 12px;color:#dde2f0;font-size:15px;line-height:1.7">Your Messenger Answer Rate tracks how often you reply to clients within 48 hours. Fall below 90% and it pulls down your whole dashboard. This course gives you the rules, the five patterns that cause it to drop, and a shift-ready reply system that keeps it green.</p><p style="margin:0;font-style:italic;font-size:14px;color:#8a92aa;line-height:1.7">"One timely reply can reopen a relationship the client already considered closed."</p><cite style="display:block;margin-top:8px;font-style:normal;font-size:12px;color:#4a5570">— Nebula Advisor Standard</cite></div><div class="outcomes-label">After this course you will be able to</div><div class="outcome-card"><div class="outcome-icon" style="background:rgba(111,112,246,.15)"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAH8AAACACAYAAAAiebbfAABeMUlEQVR42u393ZNl13UniP3WWnufc+5HZlYBLFCkht1stqxxgGG1bTDE6ZZtgDEx3eKEZEc/FObFjpiXof4JRxfwL+jJYoQjJizbD6iO6NFQI0pqx6DgGHdL4a7u div><h2>What Messenger Answer Rate Is</h2></div></div><p class="storytell">The metric is simple in formula &mdash; but powerful in impact. Every offline message is an opportunity to show a client they matter.</p><div style="background:rgba(111,112,246,.08);border:1px solid rgba(111,112,246,.25);border-radius:14px;padding:20px 22px;margin-bottom:18px"><div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#6F70F6;margin-bottom:16px;text-align:center">Formula</div><div style="text-align:center;line-height:2;font-size:15px;font-family:'Season Mix',serif;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px 4px;"><span style="background:rgba(87,255,167,.1);border:1px solid rgba(87,255,167,.25);border-radius:8px;padding:5px 12px;color:#57FFA7;font-size:13px;font-weight:600;white-space:nowrap;">Messages answered within 48h</span><span style="color:#4a5570;font-size:18px;font-weight:300;padding:0 2px;">&divide;</span><span style="background:rgba(92,206,255,.1);border:1px solid rgba(92,206,255,.25);border-radius:8px;padding:5px 12px;color:#5CCEFF;font-size:13px;font-weight:600;white-space:nowrap;">Total offline messages</span><span style="color:#4a5570;font-size:18px;font-weight:300;padding:0 2px;">&times;</span><span style="background:rgba(111,112,246,.12);border:1px solid rgba(111,112,246,.3);border-radius:8px;padding:5px 12px;color:#a0a8f0;font-size:13px;font-weight:600;">100%</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px"><div style="background:rgba(87,255,167,.07);border:1px solid rgba(87,255,167,.2);border-radius:12px;padding:16px 18px"><div style="font-size:11px;font-weight:700;color:#57FFA7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">24h &mdash; Your Standard</div><p style="font-size:13px;color:#9aa3b5;line-height:1.6;margin:0">Your personal rule and buffer. Keep your bar here and the 48h deadline never becomes a problem.</p></div><div style="background:rgba(240,96,80,.07);border:1px solid rgba(240,96,80,.2);border-radius:12px;padding:16px 18px"><div style="font-size:11px;font-weight:700;color:#f06050;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">48h &mdash; Hard Deadline</div><p style="font-size:13px;color:#9aa3b5;line-height:1.6;margin:0">After this point a reply exists &mdash; but it won&rsquo;t count toward your metric. The window is closed.</p></div></div><div class="sec-head"><div class="sec-head-row"><div class="sec-dot"></div><h2>Metrics That Grow With This Habit</h2></div></div><p class="storytell">Answering Messenger messages on time doesn&rsquo;t just move one number &mdash; it creates a ripple across your entire dashboard.</p><div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px"><div style="display:flex;align-items:flex-start;gap:14px;background:rgba(14,26,48,.7);border:1px solid rgba(111,112,246,.15);border-radius:14px;padding:14px 18px"><div style="width:36px;height:36px;min-width:36px;border-radius:50%;background:rgba(255,198,10,.15);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">⏱️</div><div><div style="font-size:13px;font-weight:600;color:#FFC60A;margin-bottom:4px">Retained Chat Duration</div><div style="font-size:12px;color:#7a8a9a;line-height:1.6">Clients who feel heard offline return for longer sessions. A timely reply signals you&rsquo;re present &mdash; they invest more time when they trust you.</div></div></div><div style="display:flex;align-items:flex-start;gap:14px;background:rgba(14,26,48,.7);border:1px solid rgba(111,112,246,.15);border-radius:14px;padding:14px 18px"><div style="width:36px;height:36px;min-width:36px;border-radius:50%;background:rgba(87,255,167,.12);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">🔄</div><div><div style="font-size:13px;font-weight:600;color:#57FFA7;margin-bottom:4px">CR to Retained Chat</div><div style="font-size:12px;color:#7a8a9a;line-height:1.6">Consistent follow-up builds the habit of returning. Clients who hear from you offline move into retained more often.</div></div></div><div style="display:flex;align-items:flex-start;gap:14px;background:rgba(14,26,48,.7);border:1px solid rgba(111,112,246,.15);border-radius:14px;padding:14px 18px"><div style="width:36px;height:36px;min-width:36px;border-radius:50%;background:rgba(92,206,255,.12);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">💰</div><div><div style="font-size:13px;font-weight:600;color:#5CCEFF;margin-bottom:4px">CR Free to Paid</div><div style="font-size:12px;color:#7a8a9a;line-height:1.6">A timely reply after a free interaction keeps the relationship warm and raises the chance they return as a paying client.</div></div></div><div style="display:flex;align-items:flex-start;gap:14px;background:rgba(14,26,48,.7);border:1px solid rgba(111,112,246,.15);border-radius:14px;padding:14px 18px"><div style="width:36px;height:36px;min-width:36px;border-radius:50%;background:rgba(111,112,246,.15);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">📡</div><div><div style="font-size:13px;font-weight:600;color:#a0a8f0;margin-bottom:4px">Nebula X Pings Coverage</div><div style="font-size:12px;color:#7a8a9a;line-height:1.6">Good Messenger habits and pinging habits go hand in hand &mdash; both are about staying present between sessions.</div></div></div></div><div class="mod-conclusion"><span class="mod-conclusion-label"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#FFC60A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-2px"><circle cx="7.5" cy="15.5" r="3.5"/><path d="m21 2-9.6 9.6M15.5 6.5l2 2"/></svg>Module Takeaway</span><ul style="margin:0;padding:0 0 0 4px;list-style:none;display:flex;flex-direction:column;gap:8px"><li style="display:flex;gap:10px;font-size:13px;color:#dde2f0;line-height:1.6"><span style="color:#FFC60A;flex-shrink:0;font-weight:700">&#x2192;</span>The hard deadline is 48h &mdash; but your personal rule should be 24h. That buffer means the metric threshold never becomes an issue.</li><li style="display:flex;gap:10px;font-size:13px;color:#dde2f0;line-height:1.6"><span style="color:#FFC60A;flex-shrink:0;font-weight:700">&#x2192;</span>One timely Messenger reply restarts a client relationship. It shows you&rsquo;re present even when there&rsquo;s no live chat.</li><li style="display:flex;gap:10px;font-size:13px;color:#dde2f0;line-height:1.6"><span style="color:#FFC60A;flex-shrink:0;font-weight:700">&#x2192;</span>This one habit moves 4 metrics at once: Retained Chat Duration, CR to Retained Chat, CR Free to Paid, and Pings Coverage.</li></ul></div><div class="complete-wrap"><button class="back-btn" onclick="goTo(0)">&#8592; Back</button><button class="complete-btn" onclick="completeModule(1)">Continue</button></div>`;},function(){return `<h1 class="module-headline">Why It Drops</h1><div class="module-body"><span class="module-overview-label"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#6F70F6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-2px"><path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.4-1.2 4.5-3 5.7V17H9v-2.3C7.2 13.5 6 11.4 6 9a6 6 0 0 1 6-6z"/><line x1="9" y1="17" x2="15" y2="17"/></svg>Module Overview &middot; 7 min</span><p class="module-overview-hook">This metric doesn&rsquo;t drop because advisors ignore clients. Most of the time it comes down to one of five fixable patterns &mdash; recognising yours is the first step to eliminating it.</p><p style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(244,244,230,.35);margin:0 0 10px;">What you'll learn</p><div class="module-results"><div class="module-result"><span class="module-result-arrow">&#x2713;</span><span class="module-result-text">Identify the 5 most common reasons advisors miss the 48h deadline</span></div><div class="module-result"><span class="module-result-arrow">&#x2713;</span><span class="module-result-text">Spot which pattern shows up most in your own shifts</span></div></div></div><div class="sec-head"><div class="sec-head-row"><div class="sec-dot"></div><h2>The 5 Reasons It Gets Missed</h2></div></div><p class="storytell">Every missed deadline has a root cause. Once you can name yours, you can fix it.</p><span class="sec-hint">Which of these patterns shows up most often in your shifts? Tap each card to find out more.</span><div class="reason-grid"><div class="reason-card" style="--rc:#f06050" onclick="this.classList.toggle('open')"><span class="reason-icon">💬</span><div class="reason-title">The message came in while you were busy<span class="reason-toggle">+</span></div><p class="reason-body">Messenger doesn't pause during live chats. If you're not checking regularly, a message can sit there while the clock counts down.</p></div><div class="reason-card" style="--rc:#FFC60A" onclick="this.classList.toggle('open')"><span class="reason-icon">📅</span><div class="reason-title">Replying &ldquo;when I remember&rdquo;<span class="reason-toggle">+</span></div><p class="reason-body">Without a fixed schedule, it's easy to push Messenger back. And "later" quietly turns into past the 48-hour mark without you noticing.</p></div><div class="reason-card" style="--rc:#5CCEFF" onclick="this.classList.toggle('open')"><span class="reason-icon">✍️</span><div class="reason-title">The reply felt too long to write<span class="reason-toggle">+</span></div><p class="reason-body">When it feels like you need to give a full detailed answer, there's temptation to delay. But Messenger doesn't need that &mdash; a short reply with a hook is all it takes.</p></div><div class="reason-card" style="--rc:#a0a8f0" onclick="this.classList.toggle('open')"><span class="reason-icon">🔔</span><div class="reason-title">Notifications weren&rsquo;t set up<span class="reason-toggle">+</span></div><p class="reason-body">No notification = easy to miss a message, especially during a busy shift. One setup step eliminates this reason permanently.</p></div></div><div class="reason-card" style="--rc:#FF48FF;margin-bottom:20px" onclick="this.classList.toggle('open')"><span class="reason-icon">🎯</span><div class="reason-title">You replied &mdash; but without a CTA<span class="reason-toggle">+</span></div><p class="reason-body">Technically the metric counts it. But a reply with no invitation back to a live chat misses the real opportunity. The stat is saved; the relationship stays flat.</p></div><div class="mod-conclusion"><span class="mod-conclusion-label"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#FFC60A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-2px"><circle cx="7.5" cy="15.5" r="3.5"/><path d="m21 2-9.6 9.6M15.5 6.5l2 2"/></svg>Module Takeaway</span><ul style="margin:0;padding:0 0 0 4px;list-style:none;display:flex;flex-direction:column;gap:8px"><li style="display:flex;gap:10px;font-size:13px;color:#dde2f0;line-height:1.6"><span style="color:#FFC60A;flex-shrink:0;font-weight:700">&#x2192;</span>Without a fixed check schedule, the 48h window closes before you notice it running &mdash; especially on busy shift days.</li><li style="display:flex;gap:10px;font-size:13px;color:#dde2f0;line-height:1.6"><span style="color:#FFC60A;flex-shrink:0;font-weight:700">&#x2192;</span>A reply without a CTA technically protects the metric but loses the chance to bring the client back into a live chat.</li><li style="display:flex;gap:10px;font-size:13px;color:#dde2f0;line-height:1.6"><span style="color:#FFC60A;flex-shrink:0;font-weight:700">&#x2192;</span>Notifications off means invisible messages. Enable them once and one drop reason disappears permanently.</li></ul></div><div class="complete-wrap"><button class="back-btn" onclick="goTo(1)">&#8592; Back</button><button class="complete-btn" onclick="completeModule(2)">Continue</button></div>`;},function(){return `<h1 class="module-headline">How to Fix It</h1><div class="module-body"><span class="module-overview-label"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#6F70F6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-2px"><path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.4-1.2 4.5-3 5.7V17H9v-2.3C7.2 13.5 6 11.4 6 9a6 6 0 0 1 6-6z"/><line x1="9" y1="17" x2="15" y2="17"/></svg>Module Overview &middot; 10 min</span><p class="module-overview-hook">Five steps. Each one removes one of the drop reasons from the previous module. Together they form a system that runs quietly in the background of every shift.</p><p style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(244,244,230,.35);margin:0 0 10px;">What you'll learn</p><div class="module-results"><div class="module-result"><span class="module-result-arrow">&#x2713;</span><span class="module-result-text">Set up two Messenger check windows and enable notifications before your next shift</span></div><div class="module-result"><span class="module-result-arrow">&#x2713;</span><span class="module-result-text">Write a personal reply using the Short answer &#x2192; Value teaser &#x2192; Invite structure</span></div></div></div><div class="sec-head"><div class="sec-head-row"><div class="sec-dot"></div><h2>5 Steps to 100% Messenger Coverage</h2></div></div><span class="sec-hint">Which of these can you implement before your next shift?</span><div class="habit-cards"><div class="habit-card"><div class="habit-num">1</div><div class="habit-body"><h4>Set two Messenger check windows per shift</h4><p>Start of shift + end of shift &mdash; 10&ndash;15 minutes each. That&rsquo;s enough to make sure nothing sits longer than 24 hours. <strong>Internal rule: I reply within 24h &mdash; so the 48h deadline never becomes a problem.</strong></p></div></div><div class="habit-card"><div class="habit-num">2</div><div class="habit-body"><h4>Turn on notifications</h4><p>Make sure Messenger notifications are enabled. You won&rsquo;t miss a new message even when you&rsquo;re deep in a live session. One setup step &mdash; one fewer thing to worry about.</p></div></div><div class="habit-card"><div class="habit-num">3</div><div class="habit-body"><h4>Prepare 3&ndash;5 reply templates</h4><p>Short templates for common question types &mdash; then personalise with one specific detail from your recent conversations with that client. Something that shows you remember them.</p></div></div><div class="habit-card"><div class="habit-num">4</div><div class="habit-body"><h4>Short reply, always with a CTA</h4><p>Your goal isn&rsquo;t to close the question in one message. It&rsquo;s to bring the client back into a live chat. Short + hook + invitation &mdash; that&rsquo;s all it needs.</p></div></div><div class="habit-card"><div class="habit-num">5</div><div class="habit-body"><h4>No time for a full reply? Write anyway</h4><p>&ldquo;I see your message &mdash; I&rsquo;ll get back to you shortly with more.&rdquo; Better than silence. It shows the client they&rsquo;re not forgotten and keeps trust intact.</p></div></div></div><div class="sec-head"><div class="sec-head-row"><div class="sec-dot"></div><h2>What a Good Reply Looks Like</h2></div></div><p class="storytell">Short, personal, and always ending with a reason to come back. Here&rsquo;s what that looks like in practice:</p><div style="background:rgba(255,255,255,.03);border-radius:14px;padding:24px;margin-bottom:20px;">
  <!-- Client message bubble -->
  <div style="display:flex;gap:10px;margin-bottom:20px;align-items:flex-start;">
    <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;">👤</div>
    <div style="background:rgba(255,255,255,.05);border-radius:4px 12px 12px 12px;padding:10px 14px;max-width:85%;">
      <p style="font-size:11px;color:#4a5570;margin:0 0 4px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;">Client</p>
      <p style="font-size:13px;color:#c8cfe0;line-height:1.6;margin:0;">"Hi, I had a session yesterday and I'm still thinking about what you said. Can I ask you something when you have a minute?"</p>
    </div>
  </div>
  <!-- Advisor bubble -->
  <div style="display:flex;gap:10px;margin-bottom:20px;align-items:flex-start;flex-direction:row-reverse;">
    <div style="width:28px;height:28px;border-radius:50%;background:rgba(111,112,246,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;">🔮</div>
    <div style="background:rgba(111,112,246,.08);border:1px solid rgba(111,112,246,.18);border-radius:14px 4px 14px 14px;padding:12px 16px;max-width:85%;">
      <p style="font-size:11px;color:#6F70F6;margin:0 0 6px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;">Advisor</p>
      <p style="font-size:13px;font-style:italic;line-height:1.75;margin:0;color:#dde2f0;">
        <span style="color:#57FFA7">"Of course — I remember our session and I want to follow up.<sup style="font-size:8px;font-style:normal;background:#57FFA7;color:#0a0f1e;border-radius:3px;padding:1px 4px;margin-left:2px;font-weight:700;vertical-align:super;">1</sup></span>
        <span style="color:#5CCEFF"> There's something important that came up that I think is key for what you're going through.<sup style="font-size:8px;font-style:normal;background:#5CCEFF;color:#0a0f1e;border-radius:3px;padding:1px 4px;margin-left:2px;font-weight:700;vertical-align:super;">2</sup></span>
        <span style="color:#a0a8f0"> Let's meet in a live chat so I can walk you through it?"<sup style="font-size:8px;font-style:normal;background:#a0a8f0;color:#0a0f1e;border-radius:3px;padding:1px 4px;margin-left:2px;font-weight:700;vertical-align:super;">3</sup></span>
      </p>
    </div>
  </div>
  <!-- Thin divider -->
  <div style="height:1px;background:rgba(255,255,255,.07);margin-bottom:14px;"></div>
  <!-- Numbered legend -->
  <div style="display:flex;flex-direction:column;gap:7px;">
    <div style="display:flex;align-items:baseline;gap:10px;">
      <span style="background:#57FFA7;color:#0a0f1e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0;">1</span>
      <span style="font-size:12px;color:#6a7690;line-height:1.5;"><span style="color:#57FFA7;font-weight:600;">Short acknowledgement</span> — show you received and remember them</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:10px;">
      <span style="background:#5CCEFF;color:#0a0f1e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0;">2</span>
      <span style="font-size:12px;color:#6a7690;line-height:1.5;"><span style="color:#5CCEFF;font-weight:600;">Value teaser</span> — hint at something meaningful without giving it away</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:10px;">
      <span style="background:#a0a8f0;color:#0a0f1e;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0;">3</span>
      <span style="font-size:12px;color:#6a7690;line-height:1.5;"><span style="color:#a0a8f0;font-weight:600;">Invitation to live chat</span> — always end with a reason to return</span>

var completed=[];
var current=0;
var TOTAL=6;

function goTo(idx){
  current=idx;
  var ca=document.getElementById('contentArea');
  try{ ca.innerHTML=MODULES[idx](); }
  catch(err){ ca.innerHTML='<div style="padding:32px;color:red;font-family:monospace">Render error M'+idx+': '+err.message+'</div>'; return; }
  initTabs(); updateNav(); window.scrollTo(0,0); document.documentElement.scrollTop=0;
}

function completeModule(idx){
  if(!completed.includes(idx)) completed.push(idx);
  var next=idx+1;
  if(next<TOTAL){ current=next; updateNav(); goTo(next); }
  else{ updateNav(); }
}

function updateNav(){
  var CHECK='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#57FFA7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="4,13 9,18 20,7"></polyline></svg>';
  for(var i=0;i<TOTAL;i++){
    var b=document.getElementById('nav-m'+i);
    var ic=document.getElementById('nav-icon-'+i);
    if(!b) continue;
    b.classList.remove('active','done','locked');
    if(i===current){ b.classList.add('active'); ic.style.background='#6F70F6'; ic.innerHTML=String(i); ic.style.fontSize='11px'; ic.style.color='#fff'; }
    else if(completed.includes(i)){ b.classList.add('done'); ic.style.background='rgba(92,206,255,.2)'; ic.innerHTML=CHECK; ic.style.fontSize='0'; }
    else{ b.classList.add('locked'); ic.style.background=''; ic.innerHTML=String(i); ic.style.fontSize='11px'; ic.style.color=''; }
  }
  var pct=Math.round((completed.length/TOTAL)*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent='Progress · '+pct+'%';
}

function initTabs(){
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var parent=btn.closest('.tabs');
      parent.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
      parent.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      var target=document.getElementById(btn.dataset.tab);
      if(target) target.classList.add('active');
      btn.classList.add('active');
    });
  });
}

function toggleAcc(btn){
  var body=btn.nextElementSibling;
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

function showDlg(type,btn){
  document.querySelectorAll('.dialogue-scene').forEach(function(s){s.classList.add('hidden');});
  document.querySelectorAll('.dtoggle-btn').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById('dialogue-'+type);
  if(el) el.classList.remove('hidden');
  btn.classList.add('active');
}



// KC Logic
var kcCurrent=0,kcAnswers={},kcActive=false;

function kcStart(){
  var s=document.getElementById('kcStart');
  s.style.display='none'; s.style.height='0'; s.style.overflow='hidden';
  document.getElementById('kcQuiz').style.display='block';
  kcCurrent=0; kcAnswers={}; kcActive=true; kcRenderQ();
}

function kcRenderQ(){
  var q=KC_QUESTIONS[kcCurrent];
  document.getElementById('kcQnum').textContent='Question '+(kcCurrent+1)+' of '+KC_QUESTIONS.length;
  document.getElementById('kcFill').style.width=Math.round(((kcCurrent+1)/KC_QUESTIONS.length)*100)+'%';
  document.getElementById('kcSelectHint').style.display='inline';
  document.getElementById('kcNextBtn').style.display='none';
  document.getElementById('kcSubmitBtn').style.display='none';
  var html='<div class="quiz-block" style="margin-bottom:0"><p class="quiz-q">'+q.q+'</p><ul class="quiz-opts">';
  q.opts.forEach(function(opt){
    html+='<li><label><input type="radio" name="kc_q" value="'+opt[0]+'" onchange="kcPick(this)"> '+opt[1]+'</label></li>';
  });
  html+='</ul></div>';
  document.getElementById('kcQuestion').innerHTML=html;
}

function kcPick(radio){
  kcAnswers[kcCurrent]=radio.value;
  document.getElementById('kcSelectHint').style.display='none';
  if(kcCurrent<KC_QUESTIONS.length-1){ document.getElementById('kcNextBtn').style.display='inline-flex'; }
  else { document.getElementById('kcSubmitBtn').style.display='inline-flex'; }
}

function kcNext(){
  if(kcCurrent<KC_QUESTIONS.length-1){ kcCurrent++; kcRenderQ(); }
}

function kcSubmit(){
  document.getElementById('kcQuiz').style.display='none';
  document.getElementById('kcResults').style.display='block';
  window.scrollTo(0,0);
  var correct=0;
  KC_QUESTIONS.forEach(function(q,i){ if(kcAnswers[i]===q.correct) correct++; });
  var total=KC_QUESTIONS.length;
  var pct=Math.round((correct/total)*100);
  var passed=correct>=Math.ceil(total*0.8);
  var barColor=passed?'#57FFA7':'#f06050';
  var bw=pct;
  var msg=passed
    ?"Well done. You have successfully completed the course — apply what you learned in every session from now on."
    :"You have completed the course.<br>No need to retake — the real value is in what you take away, not the score.<br>Take a look at the questions you missed, note what surprised you, and apply it in your future sessions.<br>That's the work.";
  var scoreEl=document.getElementById('quizScore');
  if(scoreEl){
    scoreEl.innerHTML='<div class="quiz-score-num">'+correct+'/'+total+'</div>'
      +'<div style="max-width:320px;margin:12px auto 0;position:relative;padding-top:22px">'
      +'<div style="position:absolute;top:0;left:'+bw+'%;transform:translateX(-50%);font-size:12px;color:'+barColor+';font-weight:700">'+bw+'%</div>'
      +'<div style="background:rgba(255,255,255,.06);border-radius:99px;height:8px">'
      +'<div style="width:'+bw+'%;height:100%;background:'+barColor+';border-radius:99px"></div></div>'
      +'<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#444">'
      +'<span>0%</span><span style="color:#555">Target: 80%</span><span>100%</span></div></div>'
      +'<p style="font-size:14px;color:#c8cad8;max-width:440px;margin:16px auto 0;text-align:center">'+msg+'</p>';
  }
  var html='';
  KC_QUESTIONS.forEach(function(q,i){
    var uv=kcAnswers[i];
    var isC=(uv===q.correct);
    html+='<div class="quiz-block" style="margin-bottom:10px"><p class="quiz-q">'+q.q+'</p><ul class="quiz-opts">';
    q.opts.forEach(function(opt){
      var cls='';
      if(opt[0]===q.correct) cls=' opt-correct';
      else if(opt[0]===uv&&!isC) cls=' opt-user-wrong';
      html+='<li><label class="'+cls+'"><input type="radio" disabled'+(opt[0]===uv?' checked':'')+'>'+opt[1]+'</label></li>';
    });
    html+='</ul><div class="quiz-explain '+(isC?'show-correct':'show-wrong')+'">'+(isC?q.expC:q.expW)+'</div></div>';
  });
  document.getElementById('kcResultsList').innerHTML=html;
}

function showChat(type){
  var g=document.getElementById('chat-good');
  var b=document.getElementById('chat-bad');
  var bg=document.getElementById('chat-btn-good');
  var bb=document.getElementById('chat-btn-bad');
  if(!g||!b||!bg||!bb) return;
  g.style.display=type==='good'?'block':'none';
  b.style.display=type==='bad'?'block':'none';
  if(type==='good'){
    bg.style.background='#6F70F6';bg.style.color='#fff';
    bb.style.background='transparent';bb.style.color='rgba(244,244,230,.5)';
  } else {
    bb.style.background='#f06050';bb.style.color='#fff';
    bg.style.background='transparent';bg.style.color='rgba(244,244,230,.5)';
  }
}

</script><script>
(function(){
  /* __kcNormPatched */
  function normKC(s){return s==null?'':String(s).replace(/\s+/g,'');}
  function applyKCPatch(){
    if(typeof KC_QUESTIONS==='undefined'||!Array.isArray(KC_QUESTIONS))return;
    // Normalize all correct-answer keys
    KC_QUESTIONS.forEach(function(q){
      if(q.correct!=null) q.correct=normKC(q.correct);
    });
    // Wrap kcRenderQ to also normalize radio values after render
    var orig=window.kcRenderQ;
    if(typeof orig==='function'){
      window.kcRenderQ=function(){
        orig.apply(this,arguments);
        setTimeout(function(){
          document.querySelectorAll('input[name="kc_q"]').forEach(function(r){
            r.value=normKC(r.value);
          });
        },0);
      };
    }
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',applyKCPatch);}
  else{applyKCPatch();}
})();
</script>
